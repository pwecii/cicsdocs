<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CICS DocHub — Student Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root { --navy:#0A1628; --gold:#D4A847; --gold2:#F0C96B; --cream:#FAF6EE; --muted:#8B9AB5; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'DM Sans',sans-serif; background:#F0F2F7; min-height:100vh; }

    /* ── Navbar ── */
    nav { background:var(--navy); padding:0 2rem; height:64px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
    .nav-brand { font-family:'Syne',sans-serif; font-weight:720; font-size:1.05rem; color:#fff; letter-spacing:.05em; display:flex; align-items:center; gap:.6rem; }
    .nav-brand span { color:var(--gold); }
    .nav-right { display:flex; align-items:center; gap:1.25rem; }
    .nav-user { display:flex; align-items:center; gap:.65rem; }
    .nav-user img, .nav-avatar { width:32px; height:32px; border-radius:50%; border:2px solid var(--gold); object-fit:cover; }
    .nav-avatar { background:#162340; color:var(--gold); font-family:'Syne',sans-serif; font-weight:700; font-size:.8rem; display:flex; align-items:center; justify-content:center; }
    .nav-name { font-size:.85rem; color:rgba(255,255,255,.8); font-weight:500; }
    .logout-btn { background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15); color:rgba(255,255,255,.7); font-size:.8rem; padding:.35rem .85rem; border-radius:8px; cursor:pointer; transition:all .15s; }
    .logout-btn:hover { background:rgba(255,255,255,.15); color:#fff; }

    /* ── Layout ── */
    main { max-width:1100px; margin:0 auto; padding:2.5rem 1.5rem; }
    .welcome { margin-bottom:2rem; }
    .welcome h1 { font-family:'Syne',sans-serif; font-size:1.6rem; font-weight:700; color:var(--navy); }
    .welcome p { color:var(--muted); font-size:.9rem; margin-top:.3rem; }
    .badge-program { display:inline-block; background:rgba(212,168,71,.15); border:1px solid rgba(212,168,71,.3); color:#8A6A10; font-size:.75rem; font-weight:600; padding:.25rem .75rem; border-radius:100px; margin-top:.5rem; }

    /* ── Search & filter ── */
    .toolbar { display:flex; gap:1rem; margin-bottom:2rem; flex-wrap:wrap; }
    .search-wrap { flex:1; min-width:220px; position:relative; }
    .search-wrap svg { position:absolute; left:1rem; top:50%; transform:translateY(-50%); color:var(--muted); }
    .search-input { width:100%; background:#fff; border:2px solid #DDE3EE; border-radius:12px; padding:.75rem 1rem .75rem 2.75rem; font-family:'DM Sans',sans-serif; font-size:.93rem; outline:none; transition:border-color .2s; }
    .search-input:focus { border-color:var(--gold); }
    .filter-select { background:#fff; border:2px solid #DDE3EE; border-radius:12px; padding:.75rem 1rem; font-family:'DM Sans',sans-serif; font-size:.88rem; outline:none; cursor:pointer; transition:border-color .2s; min-width:180px; }
    .filter-select:focus { border-color:var(--gold); }

    /* ── Doc grid ── */
    .doc-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:1.25rem; }
    .doc-card { background:#fff; border-radius:16px; border:2px solid #E8ECF4; padding:1.5rem; display:flex; flex-direction:column; gap:1rem; transition:all .2s; cursor:default; }
    .doc-card:hover { border-color:var(--gold); box-shadow:0 8px 24px rgba(212,168,71,.12); transform:translateY(-2px); }
    .doc-icon { width:48px; height:48px; background:#FFF3E0; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:1.5rem; }
    .doc-category { font-size:.72rem; font-weight:600; color:var(--gold); text-transform:uppercase; letter-spacing:.08em; }
    .doc-title { font-family:'Syne',sans-serif; font-size:1rem; font-weight:700; color:var(--navy); line-height:1.3; }
    .doc-desc { font-size:.83rem; color:var(--muted); line-height:1.6; }
    .doc-meta { font-size:.75rem; color:#B0B9CC; display:flex; gap:.75rem; flex-wrap:wrap; }
    .doc-actions { display:flex; gap:.6rem; margin-top:auto; }
    .btn-view { flex:1; background:#F0F2F7; color:var(--navy); border:none; border-radius:8px; padding:.6rem; font-size:.82rem; font-weight:600; cursor:pointer; transition:background .15s; }
    .btn-view:hover { background:#E2E6F0; }
    .btn-download { flex:1; background:var(--navy); color:#fff; border:none; border-radius:8px; padding:.6rem; font-size:.82rem; font-weight:600; cursor:pointer; transition:all .15s; display:flex; align-items:center; justify-content:center; gap:.4rem; }
    .btn-download:hover { background:#162340; }

    /* ── Empty state ── */
    .empty { text-align:center; padding:5rem 1rem; color:var(--muted); }
    .empty .emoji { font-size:3rem; margin-bottom:1rem; }
    .empty h3 { font-family:'Syne',sans-serif; color:var(--navy); margin-bottom:.5rem; }

    /* ── Loading skeleton ── */
    .skeleton { background:linear-gradient(90deg,#e8ecf4 25%,#f0f2f7 50%,#e8ecf4 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:8px; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── Toast ── */
    .toast { position:fixed; bottom:2rem; right:2rem; background:var(--navy); color:#fff; padding:.85rem 1.5rem; border-radius:10px; font-size:.88rem; box-shadow:0 8px 24px rgba(0,0,0,.2); transform:translateY(4rem); opacity:0; transition:all .3s; z-index:999; }
    .toast.show { transform:translateY(0); opacity:1; }
    .toast.success { background:#16A34A; }
    .toast.error { background:#DC2626; }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav>
<div class="nav-brand">
  <img src="../images/neu.png" alt="NEU Logo" style="width:40px;height:40px;object-fit:contain;margin-right:.6rem;vertical-align:middle;" />
  CICS <span>DocHub</span>
</div>
    <div class="nav-right">
      <div class="nav-user">
        <div id="navAvatar" class="nav-avatar">?</div>
        <span class="nav-name" id="navName">Loading…</span>
      </div>
      <button class="logout-btn" onclick="handleLogout()">Sign out</button>
    </div>
  </nav>

  <!-- Main -->
  <main>
    <div class="welcome">
      <h1>Good day, <span id="firstName">there</span> 👋</h1>
      <p>Browse and download official CICS documents below.</p>
      <span class="badge-program" id="programBadge"></span>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" class="search-input" id="searchInput" placeholder="Search documents…" oninput="filterDocs()" />
      </div>
      <select class="filter-select" id="categoryFilter" onchange="filterDocs()">
        <option value="">All Categories</option>
      </select>
    </div>

    <div class="doc-grid" id="docGrid">
      <!-- Skeleton loaders -->
      ${Array(6).fill('<div class="doc-card"><div class="skeleton" style="height:48px;width:48px;border-radius:12px"></div><div class="skeleton" style="height:12px;width:60%"></div><div class="skeleton" style="height:20px;width:90%"></div><div class="skeleton" style="height:48px"></div></div>').join('')}
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="../js/supabase.js"></script>
  <script>
    let allDocs = [];
    let currentUserId = null;

    const CATEGORY_ICONS = {
      'Forms': '📋', 'Policies': '📜', 'Curriculum': '📚',
      'Announcements': '📢', 'Templates': '📄', 'Guidelines': '📌',
      'default': '📁'
    };

    (async () => {
      const auth = await requireAuth(false);
      if (!auth) return;
      const { session, profile } = auth;
      currentUserId = session.user.id;

      // Nav
      const name = profile.full_name || session.user.email;
      const first = name.split(' ')[0];
      document.getElementById('firstName').textContent = first;
      document.getElementById('navName').textContent = name;
      const pic = session.user.user_metadata?.avatar_url;
      if (pic) document.getElementById('navAvatar').outerHTML = `<img src="${pic}" class="nav-avatar" style="width:32px;height:32px;border-radius:50%;border:2px solid var(--gold);object-fit:cover" />`;
      else document.getElementById('navAvatar').textContent = name.slice(0,2).toUpperCase();
      if (profile.program) document.getElementById('programBadge').textContent = profile.program;

      await loadDocuments();
    })();

    async function loadDocuments() {
      const { data, error } = await _supabase
        .from('documents')
        .select('*')
        .eq('is_active', true)
        .order('created_at', { ascending: false });

      if (error) { showToast('Failed to load documents.', 'error'); return; }
      allDocs = data || [];

      // Populate category filter
      const cats = [...new Set(allDocs.map(d => d.category).filter(Boolean))];
      const sel = document.getElementById('categoryFilter');
      cats.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; sel.appendChild(o); });

      renderDocs(allDocs);
    }

    function filterDocs() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const cat = document.getElementById('categoryFilter').value;
      const filtered = allDocs.filter(d => {
        const matchQ = !q || d.title.toLowerCase().includes(q) || (d.description||'').toLowerCase().includes(q);
        const matchC = !cat || d.category === cat;
        return matchQ && matchC;
      });
      renderDocs(filtered);
    }

    function renderDocs(docs) {
      const grid = document.getElementById('docGrid');
      if (!docs.length) {
        grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="emoji">🔍</div><h3>No documents found</h3><p>Try adjusting your search or filter.</p></div>`;
        return;
      }
      grid.innerHTML = docs.map(doc => {
        const icon = CATEGORY_ICONS[doc.category] || CATEGORY_ICONS.default;
        const size = doc.file_size ? formatSize(doc.file_size) : '';
        const date = new Date(doc.created_at).toLocaleDateString('en-PH', {month:'short',day:'numeric',year:'numeric'});
        return `
          <div class="doc-card">
            <div class="doc-icon">${icon}</div>
            <div>
              <div class="doc-category">${doc.category || 'General'}</div>
              <div class="doc-title">${escHtml(doc.title)}</div>
              ${doc.description ? `<div class="doc-desc">${escHtml(doc.description)}</div>` : ''}
            </div>
            <div class="doc-meta">
              <span>📅 ${date}</span>
              ${size ? `<span>💾 ${size}</span>` : ''}
            </div>
            <div class="doc-actions">
              <button class="btn-view" onclick="viewDoc('${doc.id}','${escHtml(doc.file_path)}')">View</button>
              <button class="btn-download" onclick="downloadDoc('${doc.id}','${escHtml(doc.file_path)}','${escHtml(doc.title)}')">
                <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Download
              </button>
            </div>
          </div>`;
      }).join('');
    }

    async function viewDoc(id, filePath) {
      try {
        const url = await getDocumentURL(filePath);
        await logDownload(id, currentUserId);
        window.open(url, '_blank');
      } catch(e) { showToast('Could not open document.', 'error'); }
    }

    async function downloadDoc(id, filePath, title) {
      try {
        showToast('Preparing download…');
        const url = await getDocumentURL(filePath);
        await logDownload(id, currentUserId);
        const a = document.createElement('a');
        a.href = url; a.download = title + '.pdf'; a.click();
        showToast('Download started!', 'success');
      } catch(e) { showToast('Download failed.', 'error'); }
    }

    async function handleLogout() {
      await signOut();
      window.location.href = '../index.html';
    }

    function showToast(msg, type='') {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className = 'toast show' + (type ? ' '+type : '');
      setTimeout(() => t.className = 'toast', 3000);
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
      return (bytes/1048576).toFixed(1) + ' MB';
    }

    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  </script>
</body>
</html>
