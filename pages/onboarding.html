<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CICS DocHub — Set Up Your Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root { --navy:#0A1628; --gold:#D4A847; --gold2:#F0C96B; --cream:#FAF6EE; }
    body { font-family:'DM Sans',sans-serif; background:var(--navy); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem; }
    .card { background:var(--cream); border-radius:24px; padding:3rem; width:100%; max-width:520px; position:relative; overflow:hidden; }
    .card::before { content:''; position:absolute; top:0;left:0;right:0; height:5px; background:linear-gradient(90deg,var(--gold),var(--gold2)); }
    .step-badge { display:inline-flex; align-items:center; gap:.5rem; background:rgba(212,168,71,.12); border:1px solid rgba(212,168,71,.3); color:var(--gold); font-size:.75rem; font-weight:600; padding:.3rem .85rem; border-radius:100px; letter-spacing:.06em; text-transform:uppercase; margin-bottom:1.5rem; }
    h1 { font-family:'Syne',sans-serif; font-size:1.85rem; font-weight:800; color:var(--navy); line-height:1.15; margin-bottom:.6rem; }
    p.sub { font-size:.9rem; color:#6B7A99; line-height:1.7; margin-bottom:2rem; }
    .avatar { width:56px; height:56px; border-radius:50%; object-fit:cover; border:3px solid var(--gold); margin-bottom:1.25rem; }
    .avatar-placeholder { width:56px; height:56px; border-radius:50%; background:#0A1628; color:var(--gold); font-family:'Syne',sans-serif; font-weight:700; font-size:1.25rem; display:flex; align-items:center; justify-content:center; margin-bottom:1.25rem; }
    label { display:block; font-size:.83rem; font-weight:600; color:#4A5680; letter-spacing:.04em; text-transform:uppercase; margin-bottom:.5rem; }
    select, input[type=text] {
      width:100%; background:#fff; border:2px solid #DDE3EE; border-radius:10px;
      padding:.85rem 1rem; font-family:'DM Sans',sans-serif; font-size:.95rem; color:var(--navy);
      outline:none; transition:border-color .2s; margin-bottom:1.5rem; appearance:none;
    }
    select:focus, input[type=text]:focus { border-color:var(--gold); }
    .submit-btn { width:100%; background:var(--navy); color:#fff; font-family:'Syne',sans-serif; font-weight:700; font-size:1rem; padding:1rem; border:none; border-radius:12px; cursor:pointer; transition:all .2s; }
    .submit-btn:hover { background:#162340; transform:translateY(-1px); box-shadow:0 8px 24px rgba(10,22,40,.25); }
    .submit-btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }
    .select-wrapper { position:relative; }
    .select-wrapper::after { content:'▾'; position:absolute; right:1rem; top:50%; transform:translateY(-60%); color:var(--gold); font-size:.85rem; pointer-events:none; margin-top:-0.75rem; }
  </style>
</head>
<body>
  <div class="card">
    <div id="avatarArea"></div>
    <div class="step-badge">✦ First time setup</div>
    <h1>Almost there!</h1>
    <p class="sub">Tell us your undergraduate program so we can show you the most relevant documents. You can always change this later.</p>

    <label for="fullName">Full Name</label>
    <input type="text" id="fullName" placeholder="e.g. Juan dela Cruz" />

    <label for="program">Undergraduate Program</label>
    <div class="select-wrapper">
      <select id="program">
        <option value="">— Select your program —</option>
        <option value="BSCS">BS Computer Science (BSCS)</option>
        <option value="BSIT">BS Information Technology (BSIT)</option>
        <option value="BSIS">BS Information Systems (BSIS)</option>
        <option value="BSEMC">BS Entertainment &amp; Multimedia Computing (BSEMC)</option>
      </select>
    </div>

    <button class="submit-btn" id="saveBtn" onclick="saveProfile()">Save &amp; Continue →</button>
  </div>

  <script src="../js/supabase.js"></script>
  <script>
    let currentUserId = null;
    (async () => {
      const auth = await requireAuth(false);
      if (!auth) return;
      const { session, profile } = auth;
      currentUserId = session.user.id;
      if (profile.program) { window.location.href = 'student-dashboard.html'; return; }

      // Prefill name
      const nameFromMeta = session.user.user_metadata?.full_name || '';
      document.getElementById('fullName').value = nameFromMeta;

      // Avatar
      const pic = session.user.user_metadata?.avatar_url;
      const area = document.getElementById('avatarArea');
      if (pic) {
        area.innerHTML = `<img src="${pic}" class="avatar" />`;
      } else {
        const initials = nameFromMeta.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase() || '?';
        area.innerHTML = `<div class="avatar-placeholder">${initials}</div>`;
      }
    })();

    async function saveProfile() {
      const program = document.getElementById('program').value;
      const fullName = document.getElementById('fullName').value.trim();
      if (!program) { alert('Please select your program.'); return; }
      if (!fullName) { alert('Please enter your full name.'); return; }
      document.getElementById('saveBtn').disabled = true;
      document.getElementById('saveBtn').textContent = 'Saving…';
      await _supabase.from('profiles').update({ program, full_name: fullName }).eq('id', currentUserId);
      window.location.href = 'student-dashboard.html';
    }
  </script>
</body>
</html>
