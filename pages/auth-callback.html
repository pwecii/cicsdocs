<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CICS DocHub — Authenticating…</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'DM Sans',sans-serif; background:#0A1628; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1rem; }
    .card { background:#FAF6EE; border-radius:20px; padding:3rem; text-align:center; width:100%; max-width:360px; }
    .spinner { width:48px; height:48px; border:4px solid #DDE3EE; border-top-color:#D4A847; border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 1.5rem; }
    @keyframes spin { to { transform:rotate(360deg); } }
    h2 { font-family:'Syne',sans-serif; font-size:1.3rem; color:#0A1628; margin-bottom:.5rem; }
    p  { font-size:.88rem; color:#6B7A99; }
    .err { color:#EF4444; font-weight:500; margin-top:1rem; font-size:.88rem; }
    .debug { font-size:.7rem; color:#aaa; margin-top:1rem; word-break:break-all; }
    @media (max-width:500px) {
      .card { padding:2.25rem 1.5rem; border-radius:16px; }
      h2 { font-size:1.1rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner" id="spinner"></div>
    <h2 id="title">Signing you in…</h2>
    <p id="sub">Please wait while we verify your account.</p>
    <p class="err" id="err" style="display:none"></p>
    <p class="debug" id="debug"></p>
  </div>

  <script src="../js/supabase.js"></script>
  <script>
    async function init() {
      console.log('Callback URL:', window.location.href);
      document.getElementById('debug').textContent = 'Processing…';

      let session = null;
      let attempts = 0;
      const maxAttempts = 20;

      while (!session && attempts < maxAttempts) {
        await new Promise(r => setTimeout(r, 500));
        const { data } = await _supabase.auth.getSession();
        if (data?.session) { session = data.session; break; }
        attempts++;
      }

      // Try code exchange if still no session
      if (!session) {
        const code = new URLSearchParams(window.location.search).get('code');
        if (code) {
          document.getElementById('debug').textContent = 'Exchanging code…';
          const { data } = await _supabase.auth.exchangeCodeForSession(code);
          if (data?.session) session = data.session;
        }
      }

      if (!session) {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('title').textContent = 'Sign-in failed';
        document.getElementById('sub').textContent = '';
        document.getElementById('err').textContent = 'No session found. Please try again.';
        document.getElementById('err').style.display = 'block';
        document.getElementById('debug').textContent = 'URL: ' + window.location.href;
        setTimeout(() => window.location.href = '../index.html', 4000);
        return;
      }

      const email = session.user.email;
      document.getElementById('debug').textContent = 'Logged in as: ' + email;

      // Enforce NEU domain
      if (!email.endsWith('@neu.edu.ph')) {
        await _supabase.auth.signOut();
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('title').textContent = 'Access denied';
        document.getElementById('err').textContent = 'Only @neu.edu.ph accounts are allowed.';
        document.getElementById('err').style.display = 'block';
        setTimeout(() => window.location.href = '../index.html', 4000);
        return;
      }

      // Get or create profile
      let profile;
      try {
        profile = await getProfile(session.user.id);
      } catch {
        await _supabase.from('profiles').upsert({
          id: session.user.id,
          email,
          full_name: session.user.user_metadata?.full_name || email,
          role: 'student'
        });
        try { profile = await getProfile(session.user.id); }
        catch(e) { console.error('Profile fetch failed:', e); }
      }

      if (!profile) {
        document.getElementById('err').textContent = 'Could not load profile. Please try again.';
        document.getElementById('err').style.display = 'block';
        setTimeout(() => window.location.href = '../index.html', 3000);
        return;
      }

      if (profile.is_blocked) {
        await _supabase.auth.signOut();
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('title').textContent = 'Account blocked';
        document.getElementById('err').textContent = 'Your account has been blocked. Contact the administrator.';
        document.getElementById('err').style.display = 'block';
        setTimeout(() => window.location.href = '../index.html', 4000);
        return;
      }

      // Log login — logLogin handles once-per-day check internally
      await logLogin(session.user.id);

      // Redirect
      if (profile.role === 'admin') {
        window.location.href = 'admin-dashboard.html';
      } else if (!profile.program) {
        window.location.href = 'onboarding.html';
      } else {
        window.location.href = 'student-dashboard.html';
      }
    }

    init();
  </script>
</body>
</html>
